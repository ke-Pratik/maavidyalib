# Server Configuration
server.port=${PORT:8080}
spring.application.name=studycenter

# PostgreSQL Datasource (Supabase)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Jackson
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.serialization.write-dates-as-timestamps=false

studycenter.total-seats=65
studycenter.opening-time=07:00
studycenter.closing-time=21:00

# JWT secret — set JWT_SECRET in Render environment variables
jwt.secret=${JWT_SECRET}
 
# Frontend URL — set FRONTEND_URL in Render environment variables
# e.g. https://your-app.vercel.app
frontend.url=${FRONTEND_URL}


logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
